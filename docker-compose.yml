services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/messenger?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-your-super-secret-refresh-key-change-in-production}
      - PORT=3001
      # Browser may use localhost or 127.0.0.1 — both must be allowed for CORS / Socket.io
      - FRONTEND_URL=http://localhost:5173
      - CORS_ORIGINS=http://localhost:5173,http://127.0.0.1:5173,http://localhost:5175,http://127.0.0.1:5175
      # 1 = разрешить https://*.trycloudflare.com (см. сервис cloudflared с профилем tunnel)
      - CORS_ALLOW_TRY_CLOUDFLARE=${CORS_ALLOW_TRY_CLOUDFLARE:-0}
      # 1 = разрешить https://*.ngrok-free.app / https://*.ngrok.app (см. сервис ngrok с профилем tunnel-ngrok)
      - CORS_ALLOW_NGROK=${CORS_ALLOW_NGROK:-0}
      # 1 = разрешить https://*.loca.lt / https://*.localtunnel.me (см. сервис localtunnel с профилем tunnel-lt)
      - CORS_ALLOW_LOCALTUNNEL=${CORS_ALLOW_LOCALTUNNEL:-0}
      - BUBBLE_BOT_PROMPT_PATH=/app/bubble-bot-prompt.txt
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      # Same path as multer + express.static (otherwise DB points to /uploads/* but files disappear on container recreate)
      - UPLOAD_DIR=/app/uploads
    volumes:
      # Repo-root prompt file (backend cwd in container is /app; parent has no prompt unless mounted)
      - ./bubble-bot-prompt.txt:/app/bubble-bot-prompt.txt:ro
      - messenger_uploads:/app/uploads
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - messenger-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - messenger-network

  # Quick tunnel: публичный https://*.trycloudflare.com → контейнер frontend:80
  # Запуск: docker compose --profile tunnel up -d
  # В корне репозитория в .env задайте: CORS_ALLOW_TRY_CLOUDFLARE=1 (и перезапустите backend)
  # URL смотрите: docker compose logs cloudflared
  # protocol http2: стабильнее в сетях, где UDP/QUIC режется (иначе timeout: no recent network activity)
  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles:
      - tunnel
    command: tunnel --no-autoupdate --protocol http2 --edge-ip-version 4 --url http://frontend:80
    depends_on:
      - frontend
    restart: unless-stopped
    networks:
      - messenger-network

  # ngrok tunnel: публичный https://*.ngrok-free.app → контейнер frontend:80
  # В корне репозитория в .env задайте:
  #   CORS_ALLOW_NGROK=1
  #   NGROK_AUTHTOKEN=<ваш токен из ngrok dashboard>
  # Запуск: docker compose --profile tunnel-ngrok up -d
  # URL смотрите: docker compose logs ngrok
  ngrok:
    image: ngrok/ngrok:latest
    profiles:
      - tunnel-ngrok
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN:-}
    command: http frontend:80 --log=stdout
    depends_on:
      - frontend
    restart: unless-stopped
    networks:
      - messenger-network

  # localtunnel: публичный https://*.loca.lt → контейнер frontend:80
  # В корне репозитория в .env задайте: CORS_ALLOW_LOCALTUNNEL=1
  # Запуск: docker compose --profile tunnel-lt up -d
  # URL смотрите: docker compose logs localtunnel
  localtunnel:
    image: node:20-alpine
    profiles:
      - tunnel-lt
    command: sh -lc "mkdir -p /state && npm -g --silent install localtunnel && lt --host https://loca.lt --port 80 --local-host frontend 2>&1 | awk '{ print; if ($$0 ~ /your url is:/) { print $$NF > \"/state/localtunnel.url\"; fflush(\"/state/localtunnel.url\") } }'"
    depends_on:
      - frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test -s /state/localtunnel.url"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      - ./tmp:/state
    networks:
      - messenger-network

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_DB=messenger
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - messenger-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - messenger-network

volumes:
  postgres_data:
  redis_data:
  messenger_uploads:

networks:
  messenger-network:
    driver: bridge
